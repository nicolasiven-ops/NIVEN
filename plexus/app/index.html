<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLEXUS // Demo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#07070c">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/mod_002_netmap.css">
  <link rel="stylesheet" href="/plexus/app/demo.css?v=1">
</head>
<body class="plexus-demo">

  <!-- Custom cursor (mirrors N.IVEN hub) -->
  <div class="cursor" aria-hidden="true">
    <span class="cur-bracket br-tl"></span>
    <span class="cur-bracket br-tr"></span>
    <span class="cur-bracket br-bl"></span>
    <span class="cur-bracket br-br"></span>
  </div>
  <div class="cursor-dot" aria-hidden="true"></div>

  <!-- Demo banner (fixed top strip) -->
  <div class="demo-banner">
    <div class="demo-banner-left">
      <span class="demo-dot"></span>
      <span class="demo-label">DEMO MODE</span>
      <span class="demo-fine">refresh wipes your work · save is disabled in demo</span>
    </div>
    <div class="demo-banner-right">
      <a href="/plexus/" class="demo-link">// EXIT</a>
      <a href="/plexus/#price" class="demo-buy">// GET FULL — 19 €</a>
    </div>
  </div>

  <!-- Plexus mount point -->
  <div id="module-stage" class="demo-stage"></div>

  <!-- Custom cursor logic (mirrors N.IVEN hub) -->
  <script>
    (() => {
      const cursor = document.querySelector('.cursor');
      const dot = document.querySelector('.cursor-dot');
      if (!cursor || !dot) return;
      if (!matchMedia('(hover: hover) and (pointer: fine)').matches) return;

      let visible = false;
      window.addEventListener('mousemove', (e) => {
        const t = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
        dot.style.transform = t;
        cursor.style.transform = t;
        if (!visible) {
          cursor.style.opacity = '1';
          dot.style.opacity = '1';
          visible = true;
        }
      });
      window.addEventListener('mouseleave', () => {
        cursor.style.opacity = '0';
        dot.style.opacity = '0';
        visible = false;
      });
      window.addEventListener('mousedown', () => cursor.classList.add('down'));
      window.addEventListener('mouseup',   () => cursor.classList.remove('down'));
    })();
  </script>

  <!-- Boot order: registry first, then Plexus registers itself, then we mount -->
  <script src="/module-runtime.js"></script>
  <script type="module" src="/mod_002_netmap.js"></script>
  <script type="module">
    function tryMount(retries = 100) {
      const def = window.NIVEN?.getModule?.('MOD_002');
      if (!def) {
        if (retries <= 0) {
          console.error('[demo] MOD_002 never registered');
          document.getElementById('module-stage').innerHTML =
            '<div style="padding:3rem;color:#ff003c;font-family:monospace">// PLEXUS_FAILED_TO_LOAD</div>';
          return;
        }
        setTimeout(() => tryMount(retries - 1), 50);
        return;
      }
      const stage = document.getElementById('module-stage');
      try {
        def.mount(stage, {
          sb: null, // no supabase = local-only / no save (demo behavior)
          project: { id: 'demo', code: 'MOD_002', title: 'Plexus Demo' },
          code: 'MOD_002',
          exit: () => { window.location.href = '/plexus/'; },
        });
      } catch (e) {
        console.error('[demo] mount failed', e);
      }
    }
    tryMount();
  </script>
</body>
</html>
